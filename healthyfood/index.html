<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy vs Unhealthy Food Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(180deg,#FFF8E7,#E8F8F5);
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hidden{display:none;}

/* SPLASH */
#logo{
width:220px;
animation:fade 2s infinite;
}

@keyframes fade{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* TOP */
#instruction{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
color:#6A1B9A;
}

#scoreBox{
position:absolute;
top:10px;
right:15px;
font-size:22px;
font-weight:bold;
color:#1B5E20;
}

/* FOOD */
#foodArea{
position:absolute;
top:90px;
width:100%;
display:flex;
justify-content:center;
}

#foodImage{
width:220px;
height:220px;
object-fit:contain;
}

#foodName{
margin-top:10px;
font-size:28px;
font-weight:bold;
color:#E67E22;
text-align:center;
}

/* BASKETS */
#basketContainer{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

.basketBox{
width:140px;
text-align:center;
cursor:pointer;
}

.basketImg{
width:120px;
height:120px;
object-fit:contain;
}

.basketLabel{
font-size:18px;
font-weight:bold;
color:#4E342E;
}

/* FEEDBACK (FIXED) */
.feedback{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
z-index:999;
pointer-events:none;
}

#tick{color:#2ECC71;}
#cross{color:#E74C3C;}

#message{
position:absolute;
top:60%;
font-size:26px;
font-weight:bold;
}

#tryAgain{
display:none;
position:absolute;
top:68%;
padding:12px 25px;
border:none;
border-radius:20px;
background:#F5B041;
color:white;
font-size:20px;
font-weight:bold;
}

/* END */
#endScreen h1{color:#6A1B9A;}
#finalScore{font-size:30px;font-weight:bold;color:#2E7D32;}
#stars{font-size:45px;margin-top:15px;}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
<img id="logo" src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen hidden">

<div id="instruction">Click the correct basket</div>

<div id="scoreBox">⭐ <span id="score">0</span></div>

<div id="foodArea">
<div>
<img id="foodImage">
<div id="foodName"></div>
</div>
</div>

<div id="tick" class="feedback">✅</div>
<div id="cross" class="feedback">❌</div>

<div id="message"></div>
<button id="tryAgain">Try Again</button>

<div id="basketContainer">

<div id="healthyBasket" class="basketBox">
<img class="basketImg" src="assets/healthy-basket.png">
<div class="basketLabel">Healthy</div>
</div>

<div id="unhealthyBasket" class="basketBox">
<img class="basketImg" src="assets/unhealthy-basket.png">
<div class="basketLabel">Unhealthy</div>
</div>

</div>
</div>

<!-- END -->
<div id="end" class="screen hidden">
<h1>🎉 Great Job! 🎉</h1>
<div>Score: <span id="finalScore"></span></div>
<div id="stars"></div>
</div>

<audio id="bgm" src="assets/backgroundmusic.mp3" loop></audio>
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const foods=[
{name:"Apple",img:"assets/apple.png",h:true},
{name:"Milk",img:"assets/milk.png",h:true},
{name:"Banana",img:"assets/banana.png",h:true},
{name:"Broccoli",img:"assets/brocoli.png",h:true},
{name:"Carrot",img:"assets/carrot.png",h:true},
{name:"Orange Juice",img:"assets/orange-juice.png",h:true},
{name:"Donut",img:"assets/donut.png",h:false},
{name:"Candy",img:"assets/candy.png",h:false},
{name:"Soda",img:"assets/soda.png",h:false},
{name:"Burger",img:"assets/burger.png",h:false},
{name:"Chips",img:"assets/chips.png",h:false}
];

let gameFoods=foods.sort(()=>Math.random()-0.5);
let i=0;
let score=0;

function speak(t,cb){
let msg=new SpeechSynthesisUtterance(t);
msg.rate=0.85;
msg.onend=cb;
speechSynthesis.speak(msg);
}

setTimeout(()=>{
splash.classList.add("hidden");
game.classList.remove("hidden");

speak("Hello little friend. Choose the correct basket.",startGame);

},5000);

function startGame(){
bgm.volume=0.3;
bgm.play().catch(()=>{});
showFood();
}

/* FIX APPLIED HERE */
function resetFeedback(){
tick.style.display="none";
cross.style.display="none";
message.textContent="";
tryAgain.style.display="none";
}

function showFood(){
if(i>=gameFoods.length)return endGame();

resetFeedback();

let f=gameFoods[i];
foodImage.src=f.img;
foodName.textContent=f.name;
}

function check(ans){

let f=gameFoods[i];

resetFeedback();

if(ans===f.h){

correct.currentTime=0;
correct.play();

tick.style.display="block";
message.textContent="Great Job!";
message.style.color="#2ECC71";

score++;
scoreBox.innerHTML="⭐ "+score;

setTimeout(()=>{
tick.style.display="none";
i++;
showFood();
},1000);

}else{

wrong.currentTime=0;
wrong.play();

cross.style.display="block";
message.textContent="Try Again";
message.style.color="#E74C3C";

tryAgain.style.display="block";

speechSynthesis.speak(
new SpeechSynthesisUtterance("Try again")
);

}

}

healthyBasket.onclick=()=>check(true);
unhealthyBasket.onclick=()=>check(false);

tryAgain.onclick=()=>{
cross.style.display="none";
tryAgain.style.display="none";
message.textContent="";
};

function endGame(){
game.style.display="none";
end.style.display="flex";

finalScore.textContent=score+" / "+gameFoods.length;

if(score>=10)stars.textContent="⭐⭐⭐⭐⭐";
else if(score>=8)stars.textContent="⭐⭐⭐⭐";
else if(score>=6)stars.textContent="⭐⭐⭐";
else stars.textContent="⭐⭐";
}

</script>

</body>
</html>
