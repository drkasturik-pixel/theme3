<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Healthy vs Unhealthy Food Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Trebuchet MS',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(
135deg,
#F9E79F,
#F5CBA7,
#D7BDE2,
#A9DFBF
);
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

/* Intro */

#introScreen{
background:linear-gradient(
135deg,
#FADBD8,
#FCF3CF,
#D6EAF8,
#D5F5E3
);
}

#logo{
width:min(60vw,280px);
animation:fadeLogo 2s infinite;
}

@keyframes fadeLogo{
0%{opacity:.3;}
50%{opacity:1;}
100%{opacity:.3;}
}

/* Instructions */

#instructionScreen{
padding:20px;
text-align:center;
}

.instructionBox{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
max-width:90%;
}

.instructionBox h2{
color:#8E44AD;
margin-bottom:10px;
}

/* Game */

#gameScreen{
padding:10px;
}

.topBar{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.score{
font-size:24px;
font-weight:bold;
color:#6C3483;
}

.muteBtn{
border:none;
background:#F8C471;
padding:12px 18px;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

.foodCard{
width:95%;
max-width:420px;
background:white;
padding:12px;
border-radius:30px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
display:flex;
flex-direction:column;
align-items:center;
}

.foodImage{
width:min(55vw,240px);
height:min(55vw,240px);
object-fit:contain;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

.foodName{
margin-top:8px;
font-size:30px;
font-weight:bold;
color:#E67E22;
}

.message{
margin-top:12px;
font-size:28px;
font-weight:bold;
min-height:40px;
}

.correct{
color:#27AE60;
}

.wrong{
color:#E74C3C;
}

.retryBtn{
margin-top:15px;
padding:14px 25px;
border:none;
border-radius:25px;
font-size:22px;
background:#F5B041;
color:white;
display:none;
}

.feedback{
position:absolute;
font-size:100px;
pointer-events:none;
}

.confetti{
position:absolute;
width:180px;
display:none;
}

/* Completion */

#completionScreen{
text-align:center;
padding:20px;
}

.completeBox{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
width:90%;
max-width:420px;
}

.stars{
font-size:42px;
margin:10px 0;
}

#finishConfetti{
width:180px;
}

@media(max-height:700px){

.foodImage{
width:180px;
height:180px;
}

.foodName{
font-size:24px;
}

.message{
font-size:22px;
}

}

</style>
</head>
<body>

<!-- INTRO -->

<div id="introScreen" class="screen">
<img id="logo" src="innovine-logo.png" alt="logo">
</div>

<!-- INSTRUCTIONS -->

<div id="instructionScreen" class="screen hidden">

<div class="instructionBox">
<h2>Healthy Food Adventure</h2>
<p style="font-size:24px;">
Tap only healthy foods.
</p>
</div>

</div>

<!-- GAME -->

<div id="gameScreen" class="screen hidden">

<div class="topBar">
<button class="muteBtn" id="muteBtn">🔊</button>
<div class="score">
⭐ <span id="score">0</span>
</div>
</div>

<img id="confetti" class="confetti" src="confetti.gif">

<div class="feedback" id="feedback"></div>

<div class="foodCard">

<img id="foodImage" class="foodImage">

<div id="foodName" class="foodName"></div>

<div id="message" class="message"></div>

<button id="retryBtn" class="retryBtn">
Try Again
</button>

</div>

</div>

<!-- COMPLETION -->

<div id="completionScreen" class="screen hidden">

<div class="completeBox">

<h1>🎉 Great Job! 🎉</h1>

<img id="finishConfetti" src="confetti.gif">

<h2 style="margin-top:10px;">
Score:
<span id="finalScore"></span>
</h2>

<div id="stars" class="stars"></div>

</div>

</div>

<audio id="bgMusic" src="backgroundmusic.mp3" loop></audio>
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

const healthyFoods = [
{
name:"Apple",
image:"apple.png",
healthy:true
},
{
name:"Banana",
image:"banana.png",
healthy:true
},
{
name:"Broccoli",
image:"brocoli.png",
healthy:true
},
{
name:"Carrot",
image:"carrot.png",
healthy:true
},
{
name:"Orange Juice",
image:"orange-juice.png",
healthy:true
}
];

const unhealthyFoods = [
{
name:"Burger",
image:"burger.png",
healthy:false
},
{
name:"Chips",
image:"chips.png",
healthy:false
},
{
name:"Candy",
image:"candy.png",
healthy:false
},
{
name:"Donut",
image:"donut.png",
healthy:false
},
{
name:"Soda",
image:"soda.png",
healthy:false
}
];

/* Alternate Healthy-Unhealthy */

let foods=[];

for(let i=0;i<5;i++){

foods.push(
healthyFoods[
Math.floor(Math.random()*healthyFoods.length)
]
);

foods.push(
unhealthyFoods[
Math.floor(Math.random()*unhealthyFoods.length)
]
);

}

foods=foods.sort(()=>Math.random()-0.5);

let current=0;
let score=0;

const introScreen=document.getElementById("introScreen");
const instructionScreen=document.getElementById("instructionScreen");
const gameScreen=document.getElementById("gameScreen");
const completionScreen=document.getElementById("completionScreen");

const foodImage=document.getElementById("foodImage");
const foodName=document.getElementById("foodName");
const message=document.getElementById("message");
const feedback=document.getElementById("feedback");
const retryBtn=document.getElementById("retryBtn");

const bgMusic=document.getElementById("bgMusic");
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");

const confetti=document.getElementById("confetti");

const muteBtn=document.getElementById("muteBtn");

let muted=false;

/* Intro */

setTimeout(()=>{
introScreen.classList.add("hidden");
instructionScreen.classList.remove("hidden");
speakInstructions();
},5000);

/* Speech */

function speak(text,callback){

if(!('speechSynthesis' in window)){
if(callback) callback();
return;
}

let speech=new SpeechSynthesisUtterance(text);

speech.rate=0.8;
speech.pitch=1;

speech.onend=()=>{
if(callback) callback();
};

speechSynthesis.speak(speech);

}

function speakInstructions(){

speak(
"Hello little friend. Let us learn healthy foods together. Tap only healthy foods.",
()=>{
startGame();
});
}

/* Music */

function startMusic(){

bgMusic.volume=0.2;

bgMusic.play().catch(()=>{});

}

/* Start Game */

function startGame(){

instructionScreen.classList.add("hidden");
gameScreen.classList.remove("hidden");

startMusic();

showFood();

}

/* Display Food */

function showFood(){

message.textContent="";
feedback.textContent="";
retryBtn.style.display="none";

if(current>=foods.length){

finishGame();
return;
}

let item=foods[current];

foodImage.src=item.image;
foodName.textContent=item.name;

}

/* Tap Food */

foodImage.addEventListener("click",()=>{

let item=foods[current];

if(item.healthy){

score++;

document.getElementById("score").textContent=score;

feedback.textContent="✅";
feedback.style.color="green";

message.textContent="Great Job!";
message.className="message correct";

correctSound.play();

confetti.style.display="block";

setTimeout(()=>{
confetti.style.display="none";
current++;
showFood();
},1500);

}else{

feedback.textContent="❌";
feedback.style.color="red";

message.textContent="Oops!";
message.className="message wrong";

wrongSound.play();

speak("Oops! Try again.");

retryBtn.style.display="inline-block";

}

});

retryBtn.addEventListener("click",()=>{
message.textContent="";
feedback.textContent="";
retryBtn.style.display="none";
});

/* Completion */

function finishGame(){

gameScreen.classList.add("hidden");
completionScreen.classList.remove("hidden");

document.getElementById("finalScore").textContent=
score+" / "+foods.length;

let stars="";

if(score>=9){
stars="⭐⭐⭐⭐⭐";
}
else if(score>=7){
stars="⭐⭐⭐⭐";
}
else if(score>=5){
stars="⭐⭐⭐";
}
else{
stars="⭐⭐";
}

document.getElementById("stars").textContent=stars;

speak(
"Wonderful. You finished the healthy food adventure."
);

}

/* Mute */

muteBtn.addEventListener("click",()=>{

muted=!muted;

bgMusic.muted=muted;

muteBtn.textContent=
muted ? "🔇" : "🔊";

});

</script>

</body>
</html>
