<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthy vs Unhealthy Food</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(180deg,#FFF8E7,#D6F5D6);
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hidden{
display:none;
}

/* Splash */

#logo{
width:220px;
animation:fade 2s infinite;
}

@keyframes fade{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* Game */

#instruction{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:24px;
font-weight:bold;
color:#6A1B9A;
}

#scoreBox{
position:absolute;
top:10px;
right:15px;
font-size:22px;
font-weight:bold;
color:#2E7D32;
}

#foodArea{
position:absolute;
top:90px;
width:100%;
display:flex;
justify-content:center;
}

#foodImage{
width:220px;
height:220px;
object-fit:contain;
animation:drop 0.8s ease;
}

@keyframes drop{
from{
transform:translateY(-250px);
}
to{
transform:translateY(0);
}
}

#foodName{
text-align:center;
font-size:30px;
font-weight:bold;
margin-top:5px;
color:#F57C00;
}

.bag{
position:absolute;
bottom:25px;
width:140px;
cursor:pointer;
}

#unhealthyBag{
left:15px;
}

#healthyBag{
right:15px;
}

.label{
text-align:center;
font-size:22px;
font-weight:bold;
}

.feedback{
position:absolute;
font-size:120px;
display:none;
}

#tick{
color:green;
}

#cross{
color:red;
}

#tryAgain{
display:none;
position:absolute;
top:70%;
padding:15px 30px;
font-size:22px;
border:none;
border-radius:20px;
background:#FFB74D;
}

#confetti{
display:none;
position:absolute;
width:180px;
top:30%;
}

/* End */

#stars{
font-size:50px;
margin-top:15px;
}

</style>
</head>
<body>

<!-- Splash -->

<div id="splash" class="screen">
<img src="assets/innovine-logo.png" id="logo">
</div>

<!-- Game -->

<div id="game" class="screen hidden">

<div id="instruction">
Click the correct bag
</div>

<div id="scoreBox">
⭐ <span id="score">0</span>
</div>

<div id="foodArea">

<div>
<img id="foodImage">
<div id="foodName"></div>
</div>

</div>

<div id="tick" class="feedback">✅</div>
<div id="cross" class="feedback">❌</div>

<img src="assets/confetti.gif" id="confetti">

<button id="tryAgain">
Try Again
</button>

<div id="unhealthyBag">

<img src="assets/unhealthy-bag.png"
class="bag">

<div class="label">
Unhealthy
</div>

</div>

<div id="healthyBag">

<img src="assets/healthy-bag.png"
class="bag">

<div class="label">
Healthy
</div>

</div>

</div>

<!-- End Screen -->

<div id="endScreen" class="screen hidden">

<h1>🎉 Great Job! 🎉</h1>

<h2>
Score:
<span id="finalScore"></span>
</h2>

<div id="stars"></div>

<img src="assets/confetti.gif" width="200">

</div>

<audio id="bgm" src="assets/backgroundmusic.mp3" loop></audio>
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const foods=[

{name:"Apple",img:"assets/apple.png",healthy:true},
{name:"Milk",img:"assets/milk.png",healthy:true},
{name:"Broccoli",img:"assets/brocoli.png",healthy:true},
{name:"Banana",img:"assets/banana.png",healthy:true},
{name:"Carrot",img:"assets/carrot.png",healthy:true},
{name:"Orange Juice",img:"assets/orange-juice.png",healthy:true},

{name:"Donut",img:"assets/donut.png",healthy:false},
{name:"Candy",img:"assets/candy.png",healthy:false},
{name:"Soda",img:"assets/soda.png",healthy:false},
{name:"Burger",img:"assets/burger.png",healthy:false},
{name:"Chips",img:"assets/chips.png",healthy:false}

];

let shuffled=foods.sort(()=>Math.random()-0.5);

let index=0;
let score=0;

const foodImage=document.getElementById("foodImage");
const foodName=document.getElementById("foodName");

function speak(text,callback){

if(!window.speechSynthesis){
if(callback) callback();
return;
}

let speech=
new SpeechSynthesisUtterance(text);

speech.rate=0.8;

speech.onend=()=>{
if(callback) callback();
};

speechSynthesis.speak(speech);

}

setTimeout(()=>{

document.getElementById("splash").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

speak(
"Hello little friend. Look at the food. Click the correct healthy or unhealthy bag.",
()=>{
document.getElementById("bgm").volume=.25;
document.getElementById("bgm").play();
showFood();
});

},5000);

function showFood(){

if(index>=shuffled.length){
finishGame();
return;
}

foodImage.src=shuffled[index].img;
foodName.innerHTML=shuffled[index].name;

}

function checkAnswer(selectedHealthy){

let item=shuffled[index];

if(selectedHealthy===item.healthy){

document.getElementById("score").innerHTML=++score;

document.getElementById("tick").style.display="block";

document.getElementById("correct").play();

document.getElementById("confetti").style.display="block";

setTimeout(()=>{

document.getElementById("tick").style.display="none";
document.getElementById("confetti").style.display="none";

index++;
showFood();

},1500);

}
else{

document.getElementById("cross").style.display="block";

document.getElementById("wrong").play();

document.getElementById("tryAgain").style.display="block";

speak("Oops. Try again.");

}

}

document.getElementById("healthyBag")
.onclick=()=>checkAnswer(true);

document.getElementById("unhealthyBag")
.onclick=()=>checkAnswer(false);

document.getElementById("tryAgain")
.onclick=()=>{

document.getElementById("cross").style.display="none";
document.getElementById("tryAgain").style.display="none";

};

function finishGame(){

document.getElementById("game").classList.add("hidden");
document.getElementById("endScreen").classList.remove("hidden");

document.getElementById("finalScore").innerHTML=
score+" / "+foods.length;

let stars="";

if(score>=10){
stars="⭐⭐⭐⭐⭐";
}
else if(score>=8){
stars="⭐⭐⭐⭐";
}
else if(score>=6){
stars="⭐⭐⭐";
}
else{
stars="⭐⭐";
}

document.getElementById("stars").innerHTML=stars;

speak("Wonderful. You completed the healthy food game.");

}

</script>

</body>
</html>
