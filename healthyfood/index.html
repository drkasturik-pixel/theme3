<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Healthy vs Unhealthy Food Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(
180deg,
#FFF8E7,
#E8F8F5
);
}

/* ---------- SCREENS ---------- */

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hidden{
display:none;
}

/* ---------- SPLASH ---------- */

#logo{
width:min(60vw,260px);
animation:fadeLogo 2s infinite;
}

@keyframes fadeLogo{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* ---------- GAME ---------- */

#instruction{
position:absolute;
top:10px;
left:0;
width:100%;
text-align:center;
font-size:24px;
font-weight:bold;
color:#7D3C98;
}

#scoreBox{
position:absolute;
top:10px;
right:15px;
font-size:22px;
font-weight:bold;
color:#1E8449;
}

#foodArea{
position:absolute;
top:80px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.foodCard{
text-align:center;
}

#foodImage{
width:min(50vw,220px);
height:min(50vw,220px);
object-fit:contain;
animation:dropFood .8s ease;
}

@keyframes dropFood{
from{
transform:translateY(-200px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

#foodName{
font-size:30px;
font-weight:bold;
color:#E67E22;
margin-top:8px;
}

/* ---------- BASKETS ---------- */

#basketContainer{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
align-items:flex-end;
padding:0 20px;
}

.basketBox{
width:140px;
text-align:center;
cursor:pointer;
}

.basketImg{
width:120px;
height:120px;
object-fit:contain;
}

.basketLabel{
font-size:20px;
font-weight:bold;
color:#5D4037;
}

/* ---------- FEEDBACK ---------- */

.feedback{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
z-index:999;
}

#tick{
color:#2ECC71;
}

#cross{
color:#E74C3C;
}

#tryAgain{
display:none;
position:absolute;
top:68%;
left:50%;
transform:translateX(-50%);
padding:14px 30px;
font-size:24px;
border:none;
border-radius:20px;
background:#F5B041;
color:white;
font-weight:bold;
}

/* ---------- END ---------- */

#endScreen h1{
color:#7D3C98;
margin-bottom:20px;
}

#finalScore{
font-size:32px;
font-weight:bold;
color:#27AE60;
}

#stars{
font-size:50px;
margin-top:20px;
}

/* ---------- SMALL DEVICES ---------- */

@media(max-height:700px){

#foodImage{
width:170px;
height:170px;
}

.basketImg{
width:95px;
height:95px;
}

#foodName{
font-size:24px;
}

}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splashScreen" class="screen">

<img
id="logo"
src="assets/innovine-logo.png"
alt="Innovine Logo">

</div>

<!-- GAME -->

<div id="gameScreen"
class="screen hidden">

<div id="instruction">
Click the correct basket
</div>

<div id="scoreBox">
⭐ <span id="score">0</span>
</div>

<div id="foodArea">

<div class="foodCard">

<img id="foodImage">

<div id="foodName"></div>

</div>

</div>

<div id="tick" class="feedback">
✅
</div>

<div id="cross" class="feedback">
❌
</div>

<button id="tryAgain">
Try Again
</button>

<div id="basketContainer">

<!-- LEFT HEALTHY -->

<div id="healthyBasket"
class="basketBox">

<img
src="assets/healthy-basket.png"
class="basketImg">

<div class="basketLabel">
Healthy Food
</div>

</div>

<!-- RIGHT UNHEALTHY -->

<div id="unhealthyBasket"
class="basketBox">

<img
src="assets/unhealthy-basket.png"
class="basketImg">

<div class="basketLabel">
Unhealthy Food
</div>

</div>

</div>

</div>

<!-- END -->

<div id="endScreen"
class="screen hidden">

<h1>🎉 Great Job! 🎉</h1>

<div>
Score:
<span id="finalScore"></span>
</div>

<div id="stars"></div>

</div>

<audio id="bgMusic"
src="assets/backgroundmusic.mp3"
loop></audio>

<audio id="correctSound"
src="assets/correct.mp3"></audio>

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<script>

/* ---------- FOODS ---------- */

const foods=[

{name:"Apple",img:"assets/apple.png",healthy:true},
{name:"Milk",img:"assets/milk.png",healthy:true},
{name:"Broccoli",img:"assets/brocoli.png",healthy:true},
{name:"Banana",img:"assets/banana.png",healthy:true},
{name:"Carrot",img:"assets/carrot.png",healthy:true},
{name:"Orange Juice",img:"assets/orange-juice.png",healthy:true},

{name:"Donut",img:"assets/donut.png",healthy:false},
{name:"Candy",img:"assets/candy.png",healthy:false},
{name:"Soda",img:"assets/soda.png",healthy:false},
{name:"Burger",img:"assets/burger.png",healthy:false},
{name:"Chips",img:"assets/chips.png",healthy:false}

];

/* ---------- SHUFFLE ---------- */

let gameFoods=[...foods]
.sort(()=>Math.random()-0.5);

let current=0;
let score=0;

/* ---------- SPEECH ---------- */

function speak(text,callback){

if(!window.speechSynthesis){

if(callback) callback();

return;
}

speechSynthesis.cancel();

const msg=
new SpeechSynthesisUtterance(text);

msg.rate=0.8;
msg.pitch=1;

msg.onend=()=>{

if(callback) callback();

};

speechSynthesis.speak(msg);

}

/* ---------- SPLASH ---------- */

setTimeout(()=>{

document
.getElementById("splashScreen")
.classList.add("hidden");

document
.getElementById("gameScreen")
.classList.remove("hidden");

speak(
"Hello little friend. Look at the food. Click the correct basket.",
startGame
);

},5000);

/* ---------- START ---------- */

function startGame(){

const bg=
document.getElementById("bgMusic");

bg.volume=.25;

bg.play().catch(()=>{});

showFood();

}

/* ---------- SHOW FOOD ---------- */

function showFood(){

if(current>=gameFoods.length){

finishGame();

return;
}

const item=
gameFoods[current];

document
.getElementById("foodImage")
.src=item.img;

document
.getElementById("foodName")
.textContent=item.name;

}

/* ---------- CHECK ---------- */

function checkAnswer(choice){

const item=
gameFoods[current];

if(choice===item.healthy){

document
.getElementById("tick")
.style.display="block";

const correct=
document.getElementById("correctSound");

correct.currentTime=0;
correct.play();

score++;

document
.getElementById("score")
.textContent=score;

setTimeout(()=>{

document
.getElementById("tick")
.style.display="none";

current++;

showFood();

},1200);

}

else{

document
.getElementById("cross")
.style.display="block";

document
.getElementById("tryAgain")
.style.display="block";

const wrong=
document.getElementById("wrongSound");

wrong.currentTime=0;
wrong.play();

speak("Try Again");

}

}

/* ---------- EVENTS ---------- */

document
.getElementById("healthyBasket")
.onclick=()=>{

checkAnswer(true);

};

document
.getElementById("unhealthyBasket")
.onclick=()=>{

checkAnswer(false);

};

document
.getElementById("tryAgain")
.onclick=()=>{

document
.getElementById("cross")
.style.display="none";

document
.getElementById("tryAgain")
.style.display="none";

};

/* ---------- END ---------- */

function finishGame(){

document
.getElementById("gameScreen")
.classList.add("hidden");

document
.getElementById("endScreen")
.classList.remove("hidden");

document
.getElementById("finalScore")
.textContent=
score+" / "+foods.length;

let stars="";

if(score===11)
stars="⭐⭐⭐⭐⭐";
else if(score>=9)
stars="⭐⭐⭐⭐";
else if(score>=7)
stars="⭐⭐⭐";
else
stars="⭐⭐";

document
.getElementById("stars")
.textContent=stars;

speak(
"Wonderful. You finished the healthy food adventure."
);

}

</script>

</body>
</html>
