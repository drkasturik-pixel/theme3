<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Healthy Food Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Verdana,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(180deg,#fff7b2,#d8f3c8);
}

.screen{
display:none;
height:100vh;
width:100%;
padding:15px;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.active{
display:flex;
}

.logo{
width:min(55vw,260px);
animation:fadeLogo 2s infinite;
}

@keyframes fadeLogo{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

h1{
color:#6a1b9a;
margin-bottom:10px;
}

h2{
color:#ff7043;
}

.food{
width:min(45vw,220px);
height:min(45vw,220px);
object-fit:contain;
animation:bounce 1.8s infinite;
cursor:pointer;
}

@keyframes bounce{
50%{
transform:translateY(-8px);
}
}

#foodName{
margin-top:10px;
font-size:24px;
color:#444;
font-weight:bold;
}

#scoreBox{
position:absolute;
right:15px;
top:15px;
background:white;
padding:10px 15px;
border-radius:20px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
font-weight:bold;
z-index:100;
}

#muteBtn{
position:absolute;
left:15px;
top:15px;
border:none;
background:white;
padding:10px 15px;
border-radius:20px;
font-size:20px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.15);
z-index:100;
}

.feedback{
font-size:50px;
margin-top:10px;
}

.message{
font-size:24px;
font-weight:bold;
color:#4caf50;
margin-top:10px;
}

.retry{
display:none;
margin-top:10px;
padding:12px 20px;
font-size:20px;
border:none;
border-radius:12px;
background:#ff7043;
color:white;
}

.confetti{
width:min(70vw,250px);
margin-bottom:15px;
}

.stars{
font-size:40px;
margin:10px;
}

</style>
</head>

<body>

<div id="scoreBox">
⭐ <span id="score">0</span>
</div>

<button id="muteBtn">🔊</button>

<div id="intro" class="screen active">
<img src="innovine-logo.png" class="logo">
</div>

<div id="instructions" class="screen">
<h1>Healthy Food Adventure</h1>
<h2>Let's Learn Healthy Foods!</h2>
</div>

<div id="game" class="screen">

<h1>Tap Healthy Food</h1>

<img id="foodImage" class="food">

<div id="foodName"></div>

<div id="feedback" class="feedback"></div>

<div id="message" class="message"></div>

<button id="retryBtn" class="retry">
Try Again
</button>

</div>

<div id="complete" class="screen">

<img src="confetti.gif" class="confetti">

<h1>Wonderful!</h1>

<div class="stars">⭐⭐⭐</div>

<h2>Total Score</h2>

<h1 id="finalScore">0</h1>

</div>

<audio id="bgMusic" loop>
<source src="backgroundmusic.mp3">
</audio>

<audio id="correctAudio">
<source src="correct.mp3">
</audio>

<audio id="wrongAudio">
<source src="wrong.mp3">
</audio>

<script>

let score=0;

const healthy=[
{img:"apple.png",name:"Apple",healthy:true},
{img:"brocoli.png",name:"Broccoli",healthy:true},
{img:"banana.png",name:"Banana",healthy:true},
{img:"carrot.png",name:"Carrot",healthy:true},
{img:"orange-juice.png",name:"Orange Juice",healthy:true}
];

const unhealthy=[
{img:"donut.png",name:"Donut",healthy:false},
{img:"candy.png",name:"Candy",healthy:false},
{img:"soda.png",name:"Soda",healthy:false},
{img:"burger.png",name:"Burger",healthy:false},
{img:"chips.png",name:"Chips",healthy:false}
];

let sequence=[];

for(let i=0;i<5;i++){
sequence.push(healthy[i]);
sequence.push(unhealthy[i]);
}

sequence.sort(()=>Math.random()-0.5);

function show(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

function speak(text,callback){

const msg=new SpeechSynthesisUtterance(text);

msg.rate=0.75;
msg.pitch=1;

msg.onend=()=>{
if(callback) callback();
};

speechSynthesis.speak(msg);

}

setTimeout(()=>{

show("instructions");

speak(
"Hello little friend. Let us learn healthy foods together.",
()=>{

document.getElementById("bgMusic")
.play()
.catch(()=>{});

setTimeout(startGame,1500);

}
);

},5000);

let index=0;

function startGame(){

show("game");
loadFood();

}

function loadFood(){

feedback.innerHTML="";
message.innerHTML="";
retryBtn.style.display="none";

if(index>=sequence.length){

finishGame();
return;
}

foodImage.src=sequence[index].img;
foodName.innerHTML=sequence[index].name;

}

foodImage.onclick=()=>{

let item=sequence[index];

if(item.healthy){

feedback.innerHTML="✅";

message.innerHTML="Great Job!";

correctAudio.currentTime=0;
correctAudio.play();

score++;

document.getElementById("score")
.innerHTML=score;

setTimeout(()=>{

index++;
loadFood();

},1200);

}
else{

feedback.innerHTML="❌";

message.innerHTML="Oops!";

wrongAudio.currentTime=0;
wrongAudio.play();

speak("Oops! Try again.");

retryBtn.style.display="inline-block";

}

};

retryBtn.onclick=()=>{

feedback.innerHTML="";
message.innerHTML="Tap Again";

};

function finishGame(){

show("complete");

document.getElementById("finalScore")
.innerHTML=score+" / "+sequence.length;

speak(
"Wonderful. Let us go to the next level."
);

}

muteBtn.onclick=()=>{

let music=document.getElementById("bgMusic");

music.muted=!music.muted;

muteBtn.innerHTML=
music.muted ? "🔇" : "🔊";

};

</script>

</body>
</html>
